<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>État des lieux - ExpressVélo</title>

  <style>
    :root {
      --blue-dark: #1E3A8A;
      --bg: #F3F4F6;
      --text: #374151;
      --muted: #6B7280;
      --success: #0d7a3e;
      --error: #b13030;
      --border: #E5E7EB;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      background: var(--bg);
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 28px;
      color: var(--text);
      line-height: 1.5;
    }
    .container {
      width: 100%;
      max-width: 820px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(16,24,40,0.08);
    }
    header { text-align: center; margin-bottom: 20px; }
    header h1 { margin: 0; color: var(--blue-dark); font-size: 22px; }
    header h2 { margin: 4px 0 0; font-weight: 400; font-size: 16px; color: var(--muted); }
    .meta { color: var(--muted); font-size: 13px; margin-top: 6px; }

    form .row { display: flex; gap: 12px; flex-wrap: wrap; }
    label { display: block; font-weight: 600; margin-top: 14px; font-size: 14px; color: var(--text); }
    input[type="text"], input[type="email"], input[type="date"], textarea, select {
      width: 100%; padding: 10px 12px; margin-top: 4px;
      border: 1px solid var(--border); border-radius: 8px; font-size: 15px;
      background: #fff; color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--blue-dark);
      box-shadow: 0 0 0 3px rgba(30,58,138,0.12);
    }
    textarea { min-height: 80px; resize: vertical; }

    .accessory {
      display: flex; align-items: center; gap: 12px; margin-top: 10px; flex-wrap: wrap;
      padding: 8px 12px; background: #f8fafc; border-radius: 8px; border: 1px solid #eef2f6;
    }
    .accessory .checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .accessory input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--blue-dark); margin: 0; }
    .state-select { min-width: 130px; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); }
    .accessory input[type="text"] { flex: 1; min-width: 120px; padding: 6px 10px; }

    /* ===== SIGNATURES ===== */
    .signatures-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-top: 10px;
    }
    .sign-box {
      background: #f8fafc;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #eef2f6;
    }
    .sign-box h3 {
      font-size: 14px;
      margin: 0 0 4px 0;
      color: var(--blue-dark);
    }
    .sign-box .mention {
      font-size: 12px;
      color: var(--muted);
      background: #eef2f6;
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
      margin: 2px 0 8px;
    }
    .signature-canvas {
      width: 100%;
      height: 100px;
      background: white;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: crosshair;
      display: block;
      touch-action: none;
    }
    .sign-box .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      color: var(--muted);
      cursor: pointer;
      margin-top: 6px;
      transition: 0.2s;
    }
    .sign-box .btn-ghost:hover { background: #eef2f6; }

    /* ===== PHOTOS ===== */
    .photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .photo-preview {
      width: 120px; height: 80px; object-fit: cover;
      border-radius: 6px; border: 1px solid var(--border);
    }

    /* ===== BOUTONS ===== */
    .actions {
      margin-top: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      padding-top: 20px;
      border-top: 2px solid #eef2f6;
    }
    .button {
      padding: 12px 28px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: 700;
      font-size: 15px;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .button:disabled { opacity: 0.6; cursor: not-allowed; transform: none !important; }
    .button:hover:not(:disabled) { transform: scale(1.02); }
    .button-primary { background: var(--blue-dark); color: #fff; }
    .button-primary:hover:not(:disabled) { background: #15367a; }
    .button-success { background: var(--success); color: #fff; }
    .button-success:hover:not(:disabled) { background: #0b6b35; }
    .button-secondary { background: #fff; color: var(--text); border: 1px solid var(--border); }
    .button-secondary:hover:not(:disabled) { background: #f5f7fa; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 0.8s ease-in-out infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== TOAST ===== */
    .toast {
      visibility: hidden;
      min-width: 300px;
      background: #0b2a48;
      color: #fff;
      text-align: center;
      border-radius: 50px;
      padding: 14px 24px;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      font-weight: 500;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
      opacity: 0;
      transition: visibility 0.3s, opacity 0.3s;
    }
    .toast.show { visibility: visible; opacity: 1; }
    .toast.success { background: var(--success); }
    .toast.error { background: var(--error); }

    .note { margin-top: 12px; color: var(--muted); font-size: 13px; }

    @media (max-width: 600px) {
      body { padding: 16px; }
      .container { padding: 16px; }
      .signatures-grid { grid-template-columns: 1fr; }
      .accessory { flex-direction: column; align-items: stretch; }
      .accessory .state-select { width: 100%; }
      .actions { flex-direction: column; }
      .button { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<div class="container" id="contractContainer">
  <header>
    <h1>🚲 Location de vélo</h1>
    <h2>État des lieux (au départ)</h2>
    <div class="meta">À compléter et signer par les deux parties</div>
  </header>

  <form id="etatForm">
    <!-- ===== INFOS PARTIES ===== -->
    <div class="row">
      <div style="flex:1; min-width:200px;">
        <label for="ownerName">👤 Propriétaire</label>
        <input type="text" id="ownerName" name="ownerName" placeholder="Nom du propriétaire" required>
        <input type="email" id="ownerEmail" name="ownerEmail" placeholder="Email du propriétaire" required style="margin-top:8px;">
      </div>
      <div style="flex:1; min-width:200px;">
        <label for="renterName">👤 Locataire</label>
        <input type="text" id="renterName" name="renterName" placeholder="Nom du locataire" required>
        <input type="email" id="renterEmail" name="renterEmail" placeholder="Email du locataire" required style="margin-top:8px;">
      </div>
    </div>

    <!-- ===== DÉTAILS LOCATION ===== -->
    <div class="row">
      <div style="flex:1; min-width:150px;">
        <label for="startDate">📆 Début</label>
        <input type="date" id="startDate" name="startDate">
      </div>
      <div style="flex:1; min-width:150px;">
        <label for="endDate">📆 Fin</label>
        <input type="date" id="endDate" name="endDate">
      </div>
      <div style="flex:1; min-width:150px;">
        <label for="bikeModel">🚲 Modèle</label>
        <input type="text" id="bikeModel" name="bikeModel" placeholder="Marque / modèle">
      </div>
    </div>

    <!-- ===== ACCESSOIRES ===== -->
    <label style="margin-top:18px;">🔧 Accessoires et état</label>

    <div class="accessory">
      <label class="checkbox">
        <input type="checkbox" name="extras" value="helmet">
        <span>Casque</span>
      </label>
      <select name="state_helmet" class="state-select">
        <option value="">État</option>
        <option value="bon">Bon</option>
        <option value="rayé">Rayé</option>
        <option value="choc">Choc</option>
        <option value="manquant">Manquant</option>
      </select>
      <input type="text" name="note_helmet" placeholder="Remarque">
    </div>

    <div class="accessory">
      <label class="checkbox">
        <input type="checkbox" name="extras" value="lock">
        <span>Antivol</span>
      </label>
      <select name="state_lock" class="state-select">
        <option value="">État</option>
        <option value="bon">Bon</option>
        <option value="rayé">Rayé</option>
        <option value="choc">Choc</option>
        <option value="manquant">Manquant</option>
      </select>
      <input type="text" name="note_lock" placeholder="Remarque">
    </div>

    <div class="accessory">
      <label class="checkbox">
        <input type="checkbox" name="extras" value="lights">
        <span>Éclairage</span>
      </label>
      <select name="state_lights" class="state-select">
        <option value="">État</option>
        <option value="bon">Bon</option>
        <option value="rayé">Rayé</option>
        <option value="choc">Choc</option>
        <option value="manquant">Manquant</option>
      </select>
      <input type="text" name="note_lights" placeholder="Remarque">
    </div>

    <div class="accessory">
      <label class="checkbox">
        <input type="checkbox" name="extras" value="basket">
        <span>Panier</span>
      </label>
      <select name="state_basket" class="state-select">
        <option value="">État</option>
        <option value="bon">Bon</option>
        <option value="rayé">Rayé</option>
        <option value="choc">Choc</option>
        <option value="manquant">Manquant</option>
      </select>
      <input type="text" name="note_basket" placeholder="Remarque">
    </div>

    <div class="accessory">
      <label class="checkbox">
        <input type="checkbox" name="extras" value="repairkit">
        <span>Kit réparation</span>
      </label>
      <select name="state_repairkit" class="state-select">
        <option value="">État</option>
        <option value="bon">Bon</option>
        <option value="rayé">Rayé</option>
        <option value="choc">Choc</option>
        <option value="manquant">Manquant</option>
      </select>
      <input type="text" name="note_repairkit" placeholder="Remarque">
    </div>

    <!-- ===== OBSERVATIONS ===== -->
    <label for="generalNotes">📝 Observations générales</label>
    <textarea id="generalNotes" name="generalNotes" placeholder="État général du vélo, kilométrage, anomalies, etc."></textarea>

    <!-- ===== PHOTOS ===== -->
    <label for="photos">📸 Photos (optionnel)</label>
    <input id="photos" name="photos" type="file" accept="image/*" multiple>
    <div id="photosPreview" class="photos"></div>

    <!-- ===== SIGNATURES ===== -->
    <label style="margin-top:18px;">✍️ Signatures électroniques</label>
    <div class="signatures-grid">
      <div class="sign-box">
        <h3>🔵 Propriétaire</h3>
        <div class="mention">« Lu et approuvé, bon pour accord »</div>
        <canvas class="signature-canvas" id="signature-owner"></canvas>
        <button type="button" class="btn-ghost" onclick="clearSignature('owner')">Effacer</button>
        <input type="hidden" name="signatureOwner" id="signatureOwner">
      </div>
      <div class="sign-box">
        <h3>🟢 Locataire</h3>
        <div class="mention">« Lu et approuvé, bon pour accord »</div>
        <canvas class="signature-canvas" id="signature-renter"></canvas>
        <button type="button" class="btn-ghost" onclick="clearSignature('renter')">Effacer</button>
        <input type="hidden" name="signatureRenter" id="signatureRenter">
      </div>
    </div>

    <!-- ===== BOUTONS ===== -->
    <div class="actions">
      <button type="button" class="button button-success" id="generateSendBtn">
        ✉️ Signer et envoyer aux 2 parties
      </button>
      <button type="button" class="button button-secondary" id="downloadEtatBtn">
        ⬇️ Télécharger PDF
      </button>
      <button type="button" class="button button-secondary" id="saveEtatBtn">
        💾 Enregistrer localement
      </button>
    </div>
  </form>

  <div class="note">💡 Les signatures sont obligatoires avant l'envoi.</div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<!-- ============================================================ -->
<!-- BIBLIOTHÈQUES                                                -->
<!-- ============================================================ -->
<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.1.5/dist/signature_pad.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
  (function() {
    'use strict';

    // ==========================================================
    // 1. TOAST
    // ==========================================================
    function showToast(message, type = 'info') {
      const toast = document.getElementById('toast');
      if (!toast) { alert(message); return; }
      toast.textContent = message;
      toast.className = 'toast';
      if (type === 'success') toast.classList.add('success');
      if (type === 'error') toast.classList.add('error');
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => toast.classList.remove('show'), 5000);
    }

    // ==========================================================
    // 2. SIGNATURES
    // ==========================================================
    const canvasOwner = document.getElementById('signature-owner');
    const canvasRenter = document.getElementById('signature-renter');
    
    // Ajustement pour mobile
    function resizeCanvas(canvas) {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * 2;
      canvas.height = 100 * 2;
      canvas.style.height = '100px';
      canvas.style.width = '100%';
    }
    resizeCanvas(canvasOwner);
    resizeCanvas(canvasRenter);

    const sigPadOwner = new SignaturePad(canvasOwner, { backgroundColor: 'white' });
    const sigPadRenter = new SignaturePad(canvasRenter, { backgroundColor: 'white' });

    window.clearSignature = function(type) {
      if (type === 'owner') sigPadOwner.clear();
      if (type === 'renter') sigPadRenter.clear();
    };

    // Resize au redimensionnement
    window.addEventListener('resize', () => {
      resizeCanvas(canvasOwner);
      resizeCanvas(canvasRenter);
    });

    // ==========================================================
    // 3. PHOTOS - Compression
    // ==========================================================
    const photosInput = document.getElementById('photos');
    const photosPreview = document.getElementById('photosPreview');
    let photosDataUrls = [];

    async function compressImage(file, maxWidth = 800, maxHeight = 600, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let w = img.width, h = img.height;
            if (w > maxWidth) { h = (h * maxWidth) / w; w = maxWidth; }
            if (h > maxHeight) { w = (w * maxHeight) / h; h = maxHeight; }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    photosInput.addEventListener('change', async (e) => {
      photosPreview.innerHTML = '';
      photosDataUrls = [];
      const files = Array.from(e.target.files).slice(0, 6);
      for (const file of files) {
        if (!file.type.startsWith('image/')) continue;
        try {
          const dataUrl = await compressImage(file);
          photosDataUrls.push(dataUrl);
          const img = document.createElement('img');
          img.src = dataUrl;
          img.className = 'photo-preview';
          photosPreview.appendChild(img);
        } catch (err) { console.error(err); }
      }
    });

    // ==========================================================
    // 4. RÉCUPÉRATION DES DONNÉES
    // ==========================================================
    function getFormData() {
      const form = document.getElementById('etatForm');
      const data = Object.fromEntries(new FormData(form).entries());
      
      // Extras
      const extras = Array.from(form.querySelectorAll('input[name="extras"]:checked')).map(cb => cb.value);
      data.extras = extras;
      
      // États et notes des accessoires
      const states = {};
      extras.forEach(val => {
        const sel = form.querySelector(`[name="state_${val}"]`);
        const note = form.querySelector(`[name="note_${val}"]`);
        states[val] = {
          state: sel ? sel.value || null : null,
          note: note ? note.value || null : null
        };
      });
      data.extras_states = states;
      data.photos = photosDataUrls;
      
      // Signatures (stockées dans les inputs cachés)
      document.getElementById('signatureOwner').value = sigPadOwner.toDataURL();
      document.getElementById('signatureRenter').value = sigPadRenter.toDataURL();
      data.signatureOwner = sigPadOwner.toDataURL();
      data.signatureRenter = sigPadRenter.toDataURL();
      
      return data;
    }

    function checkSignatures() {
      if (sigPadOwner.isEmpty()) {
        showToast('❌ Le propriétaire doit signer', 'error');
        return false;
      }
      if (sigPadRenter.isEmpty()) {
        showToast('❌ Le locataire doit signer', 'error');
        return false;
      }
      return true;
    }

    // ==========================================================
    // 5. GÉNÉRATION DU PDF
    // ==========================================================
    async function generatePdf(containerEl, photos = []) {
      const { jsPDF } = window.jspdf;
      
      // Capture du conteneur
      const canvas = await html2canvas(containerEl, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false
      });
      
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const doc = new jsPDF({ unit: 'pt', format: 'a4' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const margin = 20;
      const usableWidth = pageWidth - margin * 2;
      
      // Page principale
      const imgProps = doc.getImageProperties(imgData);
      const imgRatio = imgProps.width / imgProps.height;
      const imgHeight = usableWidth / imgRatio;
      doc.addImage(imgData, 'JPEG', margin, margin, usableWidth, imgHeight);

      // Pages photos
      for (const dataUrl of photos.slice(0, 6)) {
        doc.addPage();
        const pImgProps = doc.getImageProperties(dataUrl);
        const pRatio = pImgProps.width / pImgProps.height;
        const pHeight = usableWidth / pRatio;
        doc.addImage(dataUrl, 'JPEG', margin, margin, usableWidth, pHeight);
      }

      return doc.output('datauristring');
    }

    // ==========================================================
    // 6. ENVOI PAR EMAIL (Téléchargement + Gmail)
    // ==========================================================
    function sendByEmail(pdfDataUrl, data) {
      // Télécharger le PDF
      const link = document.createElement('a');
      link.href = pdfDataUrl;
      link.download = `etat-lieux-${data.renterName || 'location'}.pdf`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      // Ouvrir Gmail avec les emails
      const sujet = encodeURIComponent(`État des lieux - ${data.ownerName || 'Propriétaire'} & ${data.renterName || 'Locataire'}`);
      const corps = encodeURIComponent(
        `Bonjour,\n\n` +
        `L'état des lieux pour la location du vélo a été signé par les deux parties.\n\n` +
        `📋 Récapitulatif :\n` +
        `- Propriétaire : ${data.ownerName || 'Non spécifié'} (${data.ownerEmail || ''})\n` +
        `- Locataire : ${data.renterName || 'Non spécifié'} (${data.renterEmail || ''})\n` +
        `- Vélo : ${data.bikeModel || 'Non spécifié'}\n` +
        `- Début : ${data.startDate || 'Non spécifié'}\n` +
        `- Fin : ${data.endDate || 'Non spécifié'}\n\n` +
        `📎 Le document signé est en pièce jointe.\n\n` +
        `Cordialement.`
      );

      const gmailUrl = `https://mail.google.com/mail/?view=cm&fs=1&to=${data.ownerEmail},${data.renterEmail}&su=${sujet}&body=${corps}`;
      window.open(gmailUrl, '_blank');

      showToast('✅ PDF téléchargé. Gmail ouvert !', 'success');
    }

    // ==========================================================
    // 7. BOUTON "SIGNER ET ENVOYER AUX 2 PARTIES"
    // ==========================================================
    document.getElementById('generateSendBtn').addEventListener('click', async function() {
      console.log('🖱️ Clic sur "Signer et envoyer"');
      
      // Vérifier les signatures
      if (!checkSignatures()) return;
      
      this.disabled = true;
      const originalText = this.innerHTML;
      this.innerHTML = '<span class="spinner"></span> Génération en cours...';

      try {
        const data = getFormData();
        
        // Vérifier les emails
        if (!data.ownerEmail || !data.renterEmail) {
          showToast('❌ Les emails sont obligatoires', 'error');
          this.disabled = false;
          this.innerHTML = originalText;
          return;
        }

        showToast('📄 Génération du PDF...', 'info');
        const container = document.getElementById('contractContainer');
        const pdfDataUrl = await generatePdf(container, data.photos || []);

        showToast('✉️ Envoi aux deux parties...', 'info');
        sendByEmail(pdfDataUrl, data);

      } catch (error) {
        console.error('❌ Erreur:', error);
        showToast('❌ ' + error.message, 'error');
      } finally {
        this.disabled = false;
        this.innerHTML = '✉️ Signer et envoyer aux 2 parties';
      }
    });

    // ==========================================================
    // 8. BOUTON "TÉLÉCHARGER PDF"
    // ==========================================================
    document.getElementById('downloadEtatBtn').addEventListener('click', async function() {
      try {
        this.disabled = true;
        this.textContent = '⏳ Génération...';
        
        const data = getFormData();
        const container = document.getElementById('contractContainer');
        const pdfDataUrl = await generatePdf(container, data.photos || []);
        
        const link = document.createElement('a');
        link.href = pdfDataUrl;
        link.download = `etat-lieux-${data.renterName || 'location'}.pdf`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        
        showToast('✅ PDF téléchargé !', 'success');
      } catch (error) {
        console.error('❌ Erreur:', error);
        showToast('❌ Erreur lors du téléchargement', 'error');
      } finally {
        this.disabled = false;
        this.textContent = '⬇️ Télécharger PDF';
      }
    });

    // ==========================================================
    // 9. BOUTON "ENREGISTRER LOCALEMENT"
    // ==========================================================
    document.getElementById('saveEtatBtn').addEventListener('click', function() {
      const data = getFormData();
      localStorage.setItem('expressVeloEtat', JSON.stringify(data));
      showToast('✅ État des lieux enregistré localement', 'success');
    });

    // ==========================================================
    // 10. PRÉ-REMPLISSAGE DEPUIS L'URL
    // ==========================================================
    (function() {
      const params = new URLSearchParams(window.location.search);
      params.forEach((value, key) => {
        if (key === 'extras') return;
        const el = document.querySelector(`[name="${key}"]`);
        if (el) el.value = decodeURIComponent(value);
      });

      const extras = params.get('extras');
      if (extras) {
        extras.split(',').map(s => s.trim()).forEach(val => {
          const cb = document.querySelector(`input[name="extras"][value="${val}"]`);
          if (cb) cb.checked = true;
        });
      }

      for (const [k, v] of params.entries()) {
        if (k.startsWith('state_') || k.startsWith('note_')) {
          const el = document.querySelector(`[name="${k}"]`);
          if (el) el.value = decodeURIComponent(v);
        }
      }
    })();

    console.log('🚀 Application prête !');
  })();
</script>
</body>
</html>
