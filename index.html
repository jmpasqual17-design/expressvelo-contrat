<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contrat de location ExpressVélo</title>

  <style>
    :root{
      --blue-dark:#1E3A8A;
      --blue:#3B82F6;
      --bg:#F3F4F6;
      --text:#374151;
      --muted:#6B7280;
    }

    html, body { height: 100%; margin: 0; }

    body{
      font-family: "Inter", Arial, sans-serif;
      background: var(--bg);
      padding:20px;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .container{
      width:100%;
      max-width:760px;
      background:#fff;
      padding:28px;
      border-radius:12px;
      box-shadow:0 8px 30px rgba(16,24,40,0.08);
    }

    header{
      text-align:center;
      margin-bottom:18px;
    }

    header h1{
      margin:0;
      color:var(--blue-dark);
      font-size:20px;
      letter-spacing:0.2px;
    }

    .meta{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
    }

    form .row{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    label{
      display:block;
      font-weight:600;
      margin-top:14px;
      font-size:14px;
    }

    input[type="text"], input[type="date"], textarea, select{
      width:100%;
      padding:10px 12px;
      margin-top:6px;
      border:1px solid #E5E7EB;
      border-radius:8px;
      font-size:15px;
      color:var(--text);
      background:#fff;
    }

    textarea{ min-height:120px; resize:vertical; }

    .small{ max-width:220px; }

    .actions{
      margin-top:20px;
      display:flex;
      gap:12px;
      align-items:center;
    }

    .button{
      background:var(--blue-dark);
      color:#fff;
      padding:12px 16px;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
      border:none;
      cursor:pointer;
    }

    .button.secondary{
      background:#fff;
      color:var(--blue-dark);
      border:1px solid #E5E7EB;
    }

    .note{
      margin-top:12px;
      color:var(--muted);
      font-size:13px;
    }

    fieldset {
      margin-top:16px;
      border:1px solid #E5E7EB;
      padding:12px;
      border-radius:8px;
      background:#FAFBFC;
    }

    legend {
      font-weight:700;
      padding:0 6px;
      color:var(--text);
    }

    /* checkbox style */
    .checkbox {
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
      cursor:pointer;
      user-select:none;
    }

    .checkbox input[type="checkbox"]{
      width:18px;
      height:18px;
      border-radius:4px;
      border:1px solid #E5E7EB;
      background:#fff;
      accent-color: var(--blue-dark);
    }

    .checkbox-label{
      font-size:15px;
      color:var(--text);
    }

    @media (max-width:520px){
      .row{ flex-direction:column; }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>Contrat de location ExpressVélo</h1>
      <div class="meta">Pré‑rempli automatiquement depuis le lien reçu par email</div>
    </header>

    <form id="rentalForm">
      <label for="ownerName">Propriétaire</label>
      <input type="text" id="ownerName" name="ownerName" placeholder="Nom du propriétaire">

      <label for="renterName">Locataire</label>
      <input type="text" id="renterName" name="renterName" placeholder="Nom du locataire">

      <div class="row">
        <div class="small">
          <label for="startDate">Date de début</label>
          <input type="text" id="startDate" name="startDate" placeholder="YYYY-MM-DD ou 24 juin 2026">
        </div>

        <div class="small">
          <label for="endDate">Date de fin</label>
          <input type="text" id="endDate" name="endDate" placeholder="YYYY-MM-DD ou 25 juin 2026">
        </div>

        <div class="small">
          <label for="bikeModel">Modèle de vélo</label>
          <input type="text" id="bikeModel" name="bikeModel" placeholder="Ex : VeloCity 3000">
        </div>
      </div>

      <label for="notes">Observations</label>
      <textarea id="notes" name="notes" placeholder="État du vélo, accessoires, caution..."></textarea>

      <!-- Accessoires fournis : cases à cocher -->
      <fieldset>
        <legend>Accessoires fournis</legend>

        <label class="checkbox">
          <input type="checkbox" name="extras" value="helmet">
          <span class="checkbox-label">Casque fourni</span>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="extras" value="lock">
          <span class="checkbox-label">Antivol</span>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="extras" value="lights">
          <span class="checkbox-label">Éclairage</span>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="extras" value="basket">
          <span class="checkbox-label">Panier</span>
        </label>

        <label class="checkbox">
          <input type="checkbox" name="terms" value="accepted" required>
          <span class="checkbox-label">J'ai lu et j'accepte les conditions de location</span>
        </label>
      </fieldset>

      <div class="actions">
        <button type="button" class="button" id="saveBtn">Enregistrer</button>
        <button type="button" class="button secondary" id="downloadBtn">Télécharger PDF</button>
      </div>

      <div class="note">Les champs ownerName, renterName, startDate, endDate et bikeModel peuvent être pré‑remplis via l’URL. Pour pré‑cocher des accessoires, ajoute <code>&amp;extras=helmet,lock</code> à l’URL.</div>
    </form>
  </div>

  <script>
    // Pré‑remplissage depuis les paramètres d'URL (y compris extras)
    (function(){
      const params = new URLSearchParams(window.location.search);

      // pré-remplissage simple pour champs uniques
      params.forEach((value, key) => {
        if (key === 'extras' || key === 'terms') return;
        const el = document.querySelector(`[name="${key}"]`);
        if (el) el.value = decodeURIComponent(value);
      });

      // pré-remplissage pour extras (checkboxes multiples)
      const extras = params.get('extras');
      if (extras) {
        const list = extras.split(',').map(s => s.trim());
        list.forEach(val => {
          const cb = document.querySelector(`input[name="extras"][value="${val}"]`);
          if (cb) cb.checked = true;
        });
      }

      // pré-remplissage pour case unique terms
      const terms = params.get('terms');
      if (terms === 'accepted') {
        const t = document.querySelector('input[name="terms"][value="accepted"]');
        if (t) t.checked = true;
      }
    })();

    // Récupérer les données du formulaire (inclut extras comme tableau)
    function getFormData() {
      const form = document.getElementById('rentalForm');
      const data = Object.fromEntries(new FormData(form).entries());

      // extras est un tableau
      const extras = Array.from(form.querySelectorAll('input[name="extras"]:checked'))
                          .map(cb => cb.value);
      data.extras = extras;
      // terms (case unique)
      const termsEl = form.querySelector('input[name="terms"]');
      data.terms = termsEl && termsEl.checked ? termsEl.value : null;

      return data;
    }

    // Sauvegarde locale
    document.getElementById('saveBtn').addEventListener('click', () => {
      const data = getFormData();
      localStorage.setItem('expressVeloContract', JSON.stringify(data));
      alert('Contrat enregistré localement');
    });

    // Placeholder téléchargement PDF
    document.getElementById('downloadBtn').addEventListener('click', () => {
      alert('Téléchargement PDF non activé dans cette version. Je peux t’aider à l’ajouter.');
    });
  </script>

</body>
</html>
